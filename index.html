<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chroma · Random Color Palette Generator</title>
  <meta name="description" content="Generate beautiful, harmonious color palettes with a single click. Lock your favorites, tap to copy." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ff5f6d'/%3E%3Ccircle cx='35' cy='40' r='14' fill='%23ffc371'/%3E%3Ccircle cx='62' cy='38' r='12' fill='%2347d7ac'/%3E%3Ccircle cx='55' cy='64' r='13' fill='%236a82fb'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain"></div>

  <!-- Password gate: shown until the correct password is entered -->
  <div class="gate" id="gate">
    <form class="gate__box" id="gateForm" autocomplete="off">
      <span class="gate__orb"></span>
      <h1 class="gate__title">Chroma</h1>
      <p class="gate__subtitle">Enter the password to continue</p>
      <div class="gate__field">
        <input
          type="password"
          id="gateInput"
          class="gate__input"
          placeholder="Password"
          aria-label="Password"
          autofocus
        />
        <button type="submit" class="gate__submit" aria-label="Unlock">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </div>
      <p class="gate__error" id="gateError" role="alert"></p>
    </form>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Chroma</span>
    </div>
    <div class="hint">
      Press <kbd>Space</kbd> to generate · Click a color to copy
    </div>
  </header>

  <div class="page-header">
    <h1 class="page-title">Hue&rsquo;s Feeling Lucky?</h1>
    <p class="page-byline">by Oretola</p>
  </div>

  <main class="palette" id="palette" aria-live="polite"></main>

  <div class="dock">
    <button class="generate-btn" id="generateBtn">
      <span class="generate-btn__shimmer"></span>
      <span class="generate-btn__label">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v2m0 14v2m9-9h-2M5 12H3m14.5-6.5L16 7m-8 8l-1.5 1.5m11 0L16 15M8 9L6.5 7.5"/>
          <circle cx="12" cy="12" r="3.5"/>
        </svg>
        Generate palette
      </span>
    </button>
    <div class="harmony-pick" role="group" aria-label="Palette style">
      <button class="harmony-chip is-active" data-mode="auto">Surprise me</button>
      <button class="harmony-chip" data-mode="analogous">Analogous</button>
      <button class="harmony-chip" data-mode="complementary">Complementary</button>
      <button class="harmony-chip" data-mode="triadic">Triadic</button>
      <button class="harmony-chip" data-mode="mono">Monochrome</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="assertive"></div>

  <script src="gate.js"></script>
  <script src="app.js"></script>
</body>
</html>
